<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hang Out With Me?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background-image:url('iphone_responsive.jpg');
     background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.container{
    width:92%;
    max-width:420px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:28px 22px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.page{
    display:none;
    animation:fade 0.5s ease;
}

.page.active{
    display:block;
}

@media (min-width: 768px){
    body{
        background-image:url('desktop_responsive.jpg');
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:2rem;
    line-height:1.2;
    margin-bottom:18px;
}

p{
    margin-bottom:18px;
}

.gif{
    width:100%;
    border-radius:22px;
    margin-bottom:20px;
}

button{
    border:none;
    background:white;
    color: #68AEC9;
    font-weight:700;
    padding:14px 22px;
    border-radius:999px;
    cursor:pointer;
    width:100%;
    margin-top:14px;
    font-size:1rem;
    transition:0.2s ease;
}

button:hover{
    transform:scale(1.03);
}
input,
select{
    width:100%;
    max-width:100%;
    min-width:0;

    padding:16px;
    border:none;
    border-radius:20px;
    margin-top:12px;

    font-size:16px;
    font-family:'Poppins',sans-serif;

    background:rgba(255,255,255,0.22);
    color:white;

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    outline:none;

    appearance:none;
    -webkit-appearance:none;

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.15),
        0 4px 12px rgba(0,0,0,0.12);

    transition:0.2s ease;
}

input:focus,
select:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.28);
}

select option{
    color:black;
}

.options{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:16px;
}

.option{
    background:rgba(255,255,255,0.2);
    border-radius:18px;
    padding:14px;
    cursor:pointer;
    transition:0.2s ease;
    border:2px solid transparent;
}

.disabled{
    opacity:0.7;
    cursor:not-allowed;
}

.option.selected{
    border:2px solid white;
    transform:scale(1.02);
}

.big{
    font-size:3rem;
    margin-bottom:10px;
}

.final{
    font-size:1.25rem;
    line-height:1.6;
}

.final-card{
    margin-top:18px;
    background:rgba(255,255,255,0.18);
    padding:22px;
    border-radius:24px;
    backdrop-filter:blur(12px);
    box-shadow:0 4px 18px rgba(0,0,0,0.12);
}

.time-wrapper{
    width:100%;
    margin-top:12px;
    border-radius:20px;

    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(10px);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.15),
        0 4px 12px rgba(0,0,0,0.12);

    overflow:hidden;

    transition:0.2s ease;
}

.time-wrapper:focus-within{
    transform:scale(1.02);
    background:rgba(255,255,255,0.28);
}

#timeInput{
    width:100%;
    padding:16px;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#timeInput::-webkit-calendar-picker-indicator{
    filter:invert(1);
    cursor:pointer;
    width:100%;
    opacity:0;
    position:absolute;
    left:0;
}

</style>
</head>
<body>

<div class="container">

    <!-- PAGE 1 -->
    <div class="page active" id="page1">
        <img class="gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExMGVhaGE0b3FxOWUwaWZwYnR6OG8weHY3ejhiaWp1MWd3MmF6OHA1OCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/57Ioe1rrA1fpjLLMSK/giphy.gif" alt="cute gif">
        <h1>will you hang out with me tonight? 🥺</h1>
        <button onclick="nextPage(2)">yes obviously</button>
        <div class="option"
style="opacity:0.7; cursor:not-allowed; pointer-events:none; margin-top:14px;">
    no 😒
</div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
        <img class="gif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExdnY3dzcwNmphNGptM251NHMzMWdpOHF4eWc2YTFxOW1qZTFhNHNzdiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VxXIQdrklYsf9YXevX/giphy.gif" alt="cute gif">
        <h1>omg you said yes...</h1>
        <p>when will you hang out with me?</p>

        <select id="timeChoice">
            <option>Tonight</option>
            <option>Right after work</option>
            <option>Late evening vibes</option>
        </select>

        <button onclick="nextPage(3)">continue sir</button>
    </div>


    <!-- PAGE 3 -->
    <div class="page" id="page3">
          <img class="gif" src="https://64.media.tumblr.com/d25c7339bce8c61b983945a85746674d/bcbc3c70cdd104fb-ee/s540x810/69e475c69ff7da2b24900b8b40fc011b80946c55.gif" alt="cute gif">
        <h1>when are you free?</h1>

        <input type="date" id="dateInput">
         <div class="time-wrapper">
    <input type="time" id="timeInput">
</div>

 <button onclick="validatePage3()">next</button>
    </div>

    <!-- PAGE 4 -->
    <div class="page" id="page4">
        <img class="gif" src="https://giffiles.alphacoders.com/221/221682.gif" alt="cute gif">
        <h1>what do we wanna do?</h1>

        <div class="options">
            <div class="option" onclick="selectOption(this, '🛋️ cuddle and chill at home')">
                🛋️ cuddle and chill at home
            </div>

            <div class="option" onclick="selectOption(this, '🍹 drink on beach in evening')">
                🍹 drink on beach in evening
            </div>

            <div class="option" onclick="selectOption(this, '🍝 cook dinner together')">
                🍝 cook dinner together
            </div>

            <div class="option disabled">
    🫠 bedrot separately in misery
</div>
        </div>

        <button onclick="finish()">finalise our silly little plans</button>
    </div>

    <!-- PAGE 5 -->
   <!-- PAGE 5 -->
<div class="page" id="page5">
    <img class="gif"
    src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2E3dWsxN3Vkbmx1ZmFicTBic2UwYm1vZjN2dW1jcWF6dDg1anJxeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/5etWclPMB7yDtTdP4U/giphy.gif"
    alt="cute gif">

    <h1>yay!!!! 💖</h1>

    <div class="final-card">
        <p class="final" id="finalText"></p>
    </div>

    <button onclick="location.reload()">confirm!!!!</button>
</div>

</div>

<script>
let selectedActivity = "";

function nextPage(pageNumber){
    document.querySelectorAll('.page').forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById('page' + pageNumber).classList.add('active');
}

function selectOption(element, activity){
    document.querySelectorAll('.option').forEach(opt=>{
        opt.classList.remove('selected');
    });

    element.classList.add('selected');
    selectedActivity = activity;
}

function validatePage3(){

    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;

    if(!date){
        alert("pick a date first 😭");
        return;
    }

    if(!time){
        alert("u have to pick a time sir ⏰");
        return;
    }

    nextPage(4);
}

function finish(){

    if(!selectedActivity){
    alert("pick something for us to do first 😭");
    return;
}
    const date = document.getElementById('dateInput').value;
    const time = document.getElementById('timeInput').value;

    document.getElementById('finalText').innerHTML =
    `i'll get you later at <b>${time || 'whatever time you want'}</b><br><br>
    on <b>${date || 'our magical mystery day'}</b><br><br>
    and we will:<br><b>${selectedActivity || 'decide dramatically later'}</b>`;

    fetch("https://discord.com/api/webhooks/1508750828696240129/om0c2J3DDzX8kHahE7THz77zyP_xlcvXgqUoJeRWO84qx9DuYSoZamm_9snSGBEAGK8q", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content:
`💖 NEW HANGOUT REQUEST 💖

📅 Date: ${date}
⏰ Time: ${time}
✨ Activity: ${selectedActivity}`
        })
    });

    nextPage(5);
}

document.getElementById('dateInput').valueAsDate = new Date(); 
</script>

</body>
</html>
